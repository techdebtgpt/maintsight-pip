name: PR Check

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  test:
    name: Test, Lint & Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install build

      - name: Run code formatting check (ruff)
        run: python -m ruff format --check .

      - name: Run linter (ruff)
        run: python -m ruff check .

      - name: Run type checker (mypy)
        run: mypy .
        continue-on-error: true

      - name: Run tests
        run: pytest --cov=. --cov-report=xml

      - name: Build project
        run: python -m build

      - name: Check package files
        run: |
          # Check for wheel file (works across all Python versions)
          if ! ls dist/*-py3-none-any.whl 1> /dev/null 2>&1; then
            echo "❌ Wheel file missing after build"
            ls -la dist/ || echo "dist/ directory not found"
            exit 1
          fi
          # Check for source distribution
          if ! ls dist/*.tar.gz 1> /dev/null 2>&1; then
            echo "❌ Source distribution missing after build"
            ls -la dist/ || echo "dist/ directory not found"
            exit 1
          fi
          echo "✅ All package files present:"
          ls -la dist/

      - name: Upload coverage to Codecov (Python 3.12 only)
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Run safety check for known vulnerabilities
        run: |
          pip install safety
          safety check
        continue-on-error: true

      - name: Run bandit security linter
        run: |
          pip install bandit
          bandit -r . -x tests/
        continue-on-error: true
